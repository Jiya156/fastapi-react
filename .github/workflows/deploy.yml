name: Deploy FastAPI + React to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/fastapi-react
            
            echo "Saving current commit..."
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo $PREVIOUS_COMMIT > ~/last_successful_commit.txt
            
            echo "Pulling lastest code..."
            git pull origin main

            echo "Installing banckend dependencies..."
            cd ~/fastapi-react/backend
            source env/bin/activate
            pip install -r requirements.txt

            echo "Building frontend..."
            cd ~/fastapi-react/frontend
            npm install
            npm run build

            exit 1

            echo "Restarting services..."
            sudo systemctl restart fastapi
            sudo systemctl reload nginx
            
            echo "Deployment complete!"

      - name: Rollback if Deployment fails
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo "Deployment failed. Starting rollback..."

            cd ~/fastapi-react

            PREVIOUS_COMMIT=$(cat ~/last_successful_commit.txt)

            echo "Rolling back to $PREVIOUS_COMMIT"

            git checkout $PREVIOUS_COMMIT

            cd backend
            source env/bin/activate
            pip install -r requirements.txt

            cd ~/fastapi-react/frontend
            npm install
            npm run build

            sudo systemctl restart fastapi
            sudo systemctl reload nginx

            echo "Rollback completed"
